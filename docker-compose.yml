version: '3.8'

services:
  spring-boot4-test:
    image: registry.cn-hangzhou.aliyuncs.com/sunkolin/spring-boot4-test:latest
    container_name: spring-boot4-test
    restart: unless-stopped
    ports:
      - "6005:8080"
    volumes:
      - /tmp/app:/app
    environment:
      - APP_NAME=spring-boot4-test
      - APP_VERSION=1.0.0
      - APP_PORT=6005
      - APP_ENV=prod